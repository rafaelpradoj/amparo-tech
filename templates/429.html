<!doctype html>
<html lang="pt-br" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmparoTech - Um momento de gratidão</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globais.css') }}" />
  </head>
  <body class="d-flex align-items-center min-vh-100 bg-dark text-light py-5">
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8 col-xl-6 px-4 px-md-0">
          <h1 class="text-success fw-bold mb-5 display-4">
            <i class="bi bi-heart-fill"></i> AmparoTech
          </h1>
          <h2 class="fw-bold mt-5 mb-2 fs-2 fs-md-1">Casa cheia por aqui!</h2>
          <p class="lead text-body-secondary mb-5">
            Para manter tudo seguro e organizado, pedimos uma pausa de alguns segundos.
          </p>
          <div id="area-carregamento" class="mt-5">
            <div class="spinner-border text-success mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="text-warning fw-bold font-monospace small mb-0">
              Liberando o acesso em: <span id="contador" class="fs-5 text-light">60</span> segundos...
            </p>
          </div>
          <div id="area-voltar" class="mt-4" style="display: none;">
            <p class="text-success fw-bold mb-3 fs-5"><i class="bi bi-check-circle-fill"></i> Tudo pronto!</p>
            <a href="/" id="btn-redirecionar" class="btn btn-success btn-lg rounded-pill fw-bold shadow-lg d-block d-sm-inline-block px-sm-5 py-3 text-wrap">
               Voltar ao menu
            </a>
          </div>

        </div>
      </div>
    </div>
    <script>
      let tempoRestante = 60; 
      
      const elContador = document.getElementById('contador');
      const elCarregamento = document.getElementById('area-carregamento');
      const elVoltar = document.getElementById('area-voltar');

      const timer = setInterval(() => {
        tempoRestante--;
        elContador.innerText = tempoRestante;

        if (tempoRestante <= 0) {
          clearInterval(timer);
          elCarregamento.style.display = 'none';
          elVoltar.style.display = 'block';
        }
      }, 1000);
    </script>
  </body>
</html>
